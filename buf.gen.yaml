version: v1

plugins:
  - plugin: go
    out: internal/pb
    opt: paths=source_relative

  - plugin: go-grpc
    out: internal/pb
    opt: paths=source_relative

  - plugin: grpc-gateway
    out: internal/pb
    opt: paths=source_relative

  - plugin: openapiv2
    out: docs/openapiv2

  - plugin: validate
    out: internal/pb
    opt:
      - lang=go
      - paths=source_relative