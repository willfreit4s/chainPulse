syntax = "proto3";

package token.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "internal/pb/token/v1;tokenv1";

// enum Chain {
//   ETHEREUM = 1;
//   BINANCE_SMART_CHAIN = 2;
//   POLYGON = 3;
// }

// Token represents a cryptocurrency token with its associated metadata and metrics.
message Token {
  string id = 1;
  string address = 2;
  string name = 3;
  string symbol = 4;
  uint32 decimals = 5;
  double total_supply = 6;
  string chain = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp deleted_at = 10;
  bool deleted = 11;
}

// TokenMetric represents the latest market metrics for a specific token.
message TokenMetric {
  string id = 1;
  string token_id = 2;
  string token_address = 3;
  double price = 4;
  double price_change_24h = 5;
  double volume_24h = 6;
  double market_cap = 7;
  int64 holders = 8;
  int64 transactions_24h = 9;
  google.protobuf.Timestamp timestamp = 10;
  google.protobuf.Timestamp deleted_at = 11;
  bool deleted = 12;
}

// Blank message for requests that do not require any parameters.
message Blank {}

// GetTokenRequest is the request message for retrieving a token by its unique identifier.
message GetTokenRequest {
  string id = 1;
}

// ListTokensResponse is the response message containing a list of tokens.
message ListTokensResponse {
  repeated Token tokens = 1;
}

// TokenService defines the gRPC service for managing and retrieving token information and metrics.
service TokenService {
  // GetToken retrieves a token by its unique identifier.
  rpc GetToken(GetTokenRequest) returns (Token) {
    option (google.api.http) = {get: "/v1/tokens/{id}"};
  }

  // ListTokens retrieves a list of all tokens.
  rpc ListTokens(Blank) returns (ListTokensResponse) {
    option (google.api.http) = {get: "/v1/tokens"};
  }
}
